<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HW DATA - Warehouse System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <h1>Menu HW DATA</h1>

        <div id="main-menu" class="section">
            <button onclick="showSection('owner-login')">1. Owner Only</button>
            <button onclick="showSection('reseller-menu'); muatKatalogReseller()">2. Lapor Penjualan (Reseller)</button>
            <button onclick="exitApp()">3. Keluar</button>
        </div>

        <div id="owner-login" class="section">
            <h3>Owner Login</h3>
            <input type="text" id="user" placeholder="User">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleOwnerLogin()">Login</button>
            <button onclick="showSection('main-menu')">Kembali</button>
        </div>

        <div id="owner-menu" class="section">
            <h3>Menu Owner</h3>
            <button onclick="showSection('input-barang')">1. Input Barang Masuk</button>
            <button onclick="showSection('laporan-keuangan-section')">2. Laporan Keuangan</button>
            <button onclick="showSection('katalog-barang'); muatKatalog()">3. Katalog Barang</button>
            <button onclick="showSection('riwayat-transaksi-section'); muatRiwayat()">4. Riwayat Transaksi</button>
            <button onclick="showSection('main-menu')">5. Logout</button>
        </div>

        <div id="input-barang" class="section">
            <h3>Input Barang Masuk</h3>
            <input type="text" id="namaBarang" placeholder="Nama Barang">
            <input type="number" id="hargaModal" placeholder="Harga Modal">
            <input type="number" id="hargaJual" placeholder="Harga Jual">
            <input type="number" id="stok" placeholder="Jumlah Stok">
            <button onclick="handleInputBarang()">Simpan</button>
            <button onclick="showSection('owner-menu')">Batal</button>
        </div>

        <div id="katalog-barang" class="section">
            <h2>Data Stok HotWheels (Owner)</h2>
            <div class="search-box">
                <input type="text" id="cari-barang-owner" placeholder="Cari stok di gudang..." onkeyup="filterBarangOwner()">
            </div>
            <div id="owner-list-cards"></div>
            <button onclick="showSection('owner-menu')">Kembali</button>
        </div>

        <div id="laporan-keuangan-section" class="section">
            <h2>Laporan Keuangan Owner</h2>
            <div class="stat-card" style="border-color: #444; margin-bottom: 20px;">
                <h4>Filter Bulanan</h4>
                <input type="number" id="filter-bulan" placeholder="Bulan (1-12)">
                <input type="number" id="filter-tahun" value="2026">
                <button onclick="handleLaporanFilter()">Cek Laporan</button>
                <button onclick="muatLaporanTotal()">Semua Periode</button>
            </div>

            <div class="laporan-container">
                <div class="stat-card" style="border-color: green;">
                    <strong>Omset</strong>
                    <p id="display-omset">Rp 0</p>
                </div>
                <div class="stat-card" style="border-color: orange;">
                    <strong>Komisi</strong>
                    <p id="display-komisi">Rp 0</p>
                </div>
                <div class="stat-card" style="border-color: blue;">
                    <strong>Net Profit</strong>
                    <p id="display-profit">Rp 0</p>
                </div>
                <div class="stat-card" style="border-color: gray;">
                    <strong>Modal</strong>
                    <p id="display-modal">Rp 0</p>
                </div>
                <div class="stat-card" style="border-color: #ff00ff;">
                    <strong>Profitability (ROI)</strong>
                    <p id="display-roi">0%</p>
                </div>
            </div>
            <p style="text-align:center;">Periode: <span id="display-periode">-</span></p>
            <button onclick="showSection('owner-menu')">Kembali</button>
        </div>
        <div id="riwayat-transaksi-section" class="section">
            <h2>Riwayat Transaksi</h2>
            <div class="search-box">
                <input type="text" id="cari-transaksi" placeholder="Cari nama barang..." onkeyup="filterRiwayat()">
            </div>
            <div id="riwayat-list-cards"></div>
            <button onclick="showSection('owner-menu')">Kembali</button>
        </div>

        <div id="reseller-menu" class="section">
            <h3>Daftar Barang (Reseller)</h3>
            <div class="search-box">
                <input type="text" id="cari-barang" placeholder="Cari nama hotwheels..." onkeyup="filterBarangReseller()">
            </div>
            <div id="reseller-list-cards"></div>
            <button onclick="showSection('main-menu')">Kembali</button>
        </div>

    </div> 
    <div id="modal-edit" class="modal-overlay">
        <div class="modal-content" style="border-color: #00ccff;">
            <h3>Edit HotWheels</h3>
            <input type="hidden" id="edit-id">
            <label>Nama Barang:</label>
            <input type="text" id="edit-nama">
            <label>Harga Modal:</label>
            <input type="number" id="edit-modal">
            <label>Harga Jual (Est):</label>
            <input type="number" id="edit-jual">
            <button onclick="simpanPerubahanBarang()" style="border-color:#00ccff; color:#00ccff;">Simpan</button>
            <button onclick="tutupModalEdit()" style="border-color:#ff4444; color:#ff4444;">Batal</button>
        </div>
    </div>

    <div id="modal-lapor" class="modal-overlay">
        <div class="modal-content">
            <h3>Lapor Terjual</h3>
            <p id="lapor-info-barang"></p>
            <input type="hidden" id="lapor-id">
            <label>Harga Jual Laku:</label>
            <input type="number" id="lapor-harga-input">
            <button onclick="eksekusiLaporPenjualan()">Konfirmasi Laku</button>
            <button onclick="tutupModalLapor()" style="border-color:#ff4444; color:#ff4444;">Batal</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
            .then(() => console.log("PWA Active"))
            .catch(err => console.log("PWA Failed", err));
        }
    </script>
    </body>
</html>
