<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>HW DATA - Warehouse System</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div id="app">
        <h1>Menu HW DATA</h1>
        
        <div id="main-menu">
            <button onclick="showSection('owner-login')">1. Owner Only</button>
            <button onclick="showSection('reseller-menu'); muatKatalogReseller('reseller-table')">2. Lapor Penjualan (Reseller)</button>
            <button onclick="exitApp()">3. Keluar</button>
        </div>


        <div id="owner-login" style="display:none;">
            <h3>Owner Login</h3>
            <input type="text" id="user" placeholder="User">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleOwnerLogin()">Login</button>
            <button onclick="showSection('main-menu')">Kembali</button>
        </div>

        <div id="owner-menu" style="display:none;">
            <h3>Menu Owner</h3>
            <button onclick="showSection('input-barang')">1. Input Barang Masuk</button>
            <button onclick="showSection('laporan-keuangan-section')">2. Laporan Keuangan</button>
            <button onclick="showSection('katalog-barang'); muatKatalog('tabel-owner')">3. Katalog Barang</button>
            <button onclick="showSection('main-menu')">4. Logout</button>
        </div>

        <div id="input-barang" style="display:none;">
            <h3>Input Barang Masuk</h3>
            <input type="text" id="namaBarang" placeholder="Nama Barang">
            <input type="number" id="hargaModal" placeholder="Harga Modal">
            <input type="number" id="hargaJual" placeholder="Harga Jual">
            <input type="number" id="stok" placeholder="Jumlah Stok">
            <button onclick="handleInputBarang()">Simpan</button>
            <button onclick="showSection('owner-menu')">Batal</button>
        </div>

        <div id="katalog-barang" style="display: none;">
            <h2>Data Stok HotWheels</h2>
            <table border="1" id="tabel-owner">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama Barang</th>
                        <th>Stok</th>
                        <th>Harga Modal</th>
                        <th>Harga Jual (Est)</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
            <br>
            <button onclick="showSection('owner-menu')">Kembali ke Menu Owner</button>
        </div>

        <div id="laporan-keuangan-section" style="display:none;">
            <h2>Laporan Keuangan Owner</h2>
        
            <div style="margin-bottom: 20px; padding: 10px; border: 1px solid #ccc;">
                <h4>Filter Bulanan</h4>
                <input type="number" id="filter-bulan" placeholder="Bulan (1-12)" min="1" max="12">
                <input type="number" id="filter-tahun" placeholder="Tahun (2026)" value="2026">
                <button onclick="handleLaporanFilter()">Cek Laporan</button>
                <button onclick="muatLaporanTotal()">Semua Periode</button>
            </div>
        
            <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                <div style="padding: 15px; border: 2px solid green; border-radius: 8px;">
                    <strong>Total Omset:</strong>
                    <p id="display-omset">Rp 0</p>
                </div>
                <div style="padding: 15px; border: 2px solid orange; border-radius: 8px;">
                    <strong>Total Komisi:</strong>
                    <p id="display-komisi">Rp 0</p>
                </div>
                <div style="padding: 15px; border: 2px solid blue; border-radius: 8px;">
                    <strong>Net Profit:</strong>
                    <p id="display-profit">Rp 0</p>
                </div>
            </div>
            
            <p>Periode: <span id="display-periode">-</span></p>
        
            <button onclick="showSection('owner-menu')">Kembali</button>
        </div>

        <div id="reseller-menu" style="display:none;">
            <h3>Daftar Barang (Reseller)</h3>
            <table border="1" id="reseller-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Stok</th>
                        <th>Estimasi Jual</th>
                    </tr>
                </thead>
                <tbody id="reseller-list-body"></tbody>
            </table>
            <br>
            <button onclick="showSection('main-menu')">Kembali</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
